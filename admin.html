<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Enviar Notificações TUBA</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #000000 0%, #1a1a2e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: #1C1C1E;
      padding: 40px;
      border-radius: 20px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
    }
    h1 {
      color: white;
      margin-bottom: 10px;
      font-size: 28px;
    }
    .subtitle {
      color: #8E8E93;
      margin-bottom: 30px;
      font-size: 14px;
    }
    label {
      display: block;
      color: #FFFFFF;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 15px;
    }
    input, textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      border: 1px solid #3A3A3C;
      border-radius: 10px;
      background: #2C2C2E;
      color: #FFFFFF;
      font-family: inherit;
      font-size: 15px;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #007AFF;
      box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1);
    }
    textarea {
      resize: vertical;
      min-height: 100px;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #007AFF;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover {
      background: #0051D5;
      transform: translateY(-2px);
    }
    button:active {
      transform: translateY(0);
    }
    .status {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      font-weight: 600;
      display: none;
    }
    .status.success {
      display: block;
      background: rgba(52, 199, 89, 0.2);
      color: #34C759;
      border: 1px solid #34C759;
    }
    .status.error {
      display: block;
      background: rgba(255, 59, 48, 0.2);
      color: #FF3B30;
      border: 1px solid #FF3B30;
    }
    .stats {
      margin-top: 20px;
      padding: 15px;
      background: #2C2C2E;
      border-radius: 10px;
      color: #8E8E93;
      font-size: 13px;
      text-align: center;
    }
    .loading {
      display: none;
      text-align: center;
      color: #007AFF;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📢 TUBA Admin</h1>
    <p class="subtitle">Enviar notificações para todos os usuários</p>

    <label for="title">Título da Notificação *</label>
    <input type="text" id="title" placeholder="Ex: 🎉 Atualização Disponível" value="🎉 Atualização Disponível">

    <label for="body">Mensagem *</label>
    <textarea id="body" placeholder="Ex: Nova versão do TUBA foi lançada...">Nova versão do TUBA foi lançada! Recarregue o app para aproveitar as novidades.</textarea>

    <button onclick="enviarNotificacao()" id="sendBtn">
      📤 Enviar Notificação
    </button>

    <div class="loading" id="loading">
      ⏳ Enviando...
    </div>

    <div class="status" id="status"></div>
    <div class="stats" id="stats"></div>
  </div>

  <script>
    const SERVER_URL = 'https://tuba-push-server.vercel.app'; // MUDE AQUI COM SUA URL

    async function enviarNotificacao() {
      const title = document.getElementById('title').value.trim();
      const body = document.getElementById('body').value.trim();
      const statusDiv = document.getElementById('status');
      const loadingDiv = document.getElementById('loading');
      const statsDiv = document.getElementById('stats');
      const sendBtn = document.getElementById('sendBtn');

      if (!title || !body) {
        statusDiv.textContent = '❌ Preencha título e mensagem';
        statusDiv.className = 'status error';
        return;
      }

      sendBtn.disabled = true;
      loadingDiv.style.display = 'block';
      statusDiv.style.display = 'none';
      statsDiv.style.display = 'none';

      try {
        const response = await fetch(`${SERVER_URL}/api/send-notification`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, body })
        });

        const result = await response.json();

        loadingDiv.style.display = 'none';

        if (result.success) {
          statusDiv.textContent = `✅ ${result.message}`;
          statusDiv.className = 'status success';
          statsDiv.innerHTML = `
            <strong>📊 Detalhes:</strong><br>
            ✅ Enviadas: ${result.enviadas}<br>
            ❌ Erros: ${result.erros}<br>
            👥 Total de usuários inscritos: ${result.total}
          `;
          statsDiv.style.display = 'block';
        } else {
          statusDiv.textContent = `❌ ${result.error || 'Erro ao enviar'}`;
          statusDiv.className = 'status error';
        }
      } catch (error) {
        loadingDiv.style.display = 'none';
        statusDiv.textContent = `❌ Erro: ${error.message}`;
        statusDiv.className = 'status error';
        console.error('Erro:', error);
      } finally {
        sendBtn.disabled = false;
      }
    }

    // Verificar status do servidor
    async function verificarServidor() {
      try {
        const response = await fetch(`${SERVER_URL}/health`);
        const result = await response.json();
        console.log('✅ Servidor online. Usuários inscritos:', result.usuariosInscritos);
      } catch (error) {
        console.warn('⚠️ Servidor offline:', error.message);
      }
    }

    verificarServidor();
    setInterval(verificarServidor, 30000); // Verificar a cada 30s
  </script>
</body>
</html>
